
data:
  - id: jumiapay
    name: Jumia Pay
    organization: Jumia
    start_date: Jan 2019
    url: https://pay.jumia.com.ng
    end_date: ""
    summary: Payments platform by Jumia, that allows customers to make an online purchase in just one step.
    description: >
      <p>Jumia Pay is a Payments system solution by Jumia, allowing customers to make an online purchase in just one step.</p>
      <p>On JumiaPay, I worked on the following areas:</p>
      <ul>
        <li>Create the base structure for the Business Area application for Jumia Pay merchants, including User and Roles Management and ACL.</li>
         <li>Topups management feature</li>
         <li>Payment methods creation and management</li>
         <li>Withdraws, Payouts, Transfer between wallets</li>
         <li>Collaborating on the definition of Delivery pipelines and test automation</li>
      </ul>
    technologies: ['Golang', 'Java', 'MySQL', 'Postgres', 'Spring', 'Docker', 'Kong', 'GitHub', 'Kubernetes', 'Jenkins', 'Jira']
    cover_image: "jumiapay-cover.jpg"
    order: 1

  - id: jforce
    name: JForce
    organization: Jumia
    start_date: Jun 2018
    end_date: Dec 2018
    url: https://jforce.jumia.com.ng/
    summary: Web Application developed to help the thousands of agents that Jumia has in the field across all Africa, by providing them easy access to their orders, sales, commissions, etc.
    description: >
      <p>JForce is a Web Application that aims to help the thousands of agents that Jumia has in the field across all Africa, by providing them access to their orders, sales, commissions and more.</p>
      <p>On JForce project, I worked on the following areas:</p>
      <ul>
        <li>Development of all necessary APIs following a Microservices oriented architecture.</li>
        <li>Orders Processing System using Golang concurrency features.</li>
        <li>Commissions calculation engine (golang)</li>
      </ul>
    technologies: ['PHP7', 'Symfony4', 'Golang', 'MySQL', 'REST', 'Microservices', 'Git', 'GitHub', 'Jira', 'Docker', 'Jenkins', 'Kubernetes']
    cover_image: "jforce-cover.png"
    order: 4

  - id: jflights
    name: Jumia Flights
    organization: Jumia
    start_date: Aug 2017
    end_date: May 2018
    url: https://travel.jumia.com/en-gb/flights
    summary: The biggest flights marketplace for Africa.
    description: >
      <p>Jumia Flights is the Flights booking solution of Jumia and aims to be the biggest Flights marketplace ifor Africa.</p>
      <p>I have worked in this project from the ground up, including:</p>
      <ul>
      <li>Define the application architecture following a Microservices oriented approach.</li>
      <li>Implement core features such as Search, Booking and Payments, using Java and PHP</li>
      <li>Implementation of Rules Engine for Flights Search using Golang.</li>
      <li>Orders and Payments State Machines service (PHP)</li>
      <li>Integration with well known third party Flights providers like Amadeus and Kiwi</li>
      <li>Multi-provider search using WebSockets.</li>
    technologies: ['PHP7', 'Phalcon', 'Golang', 'Java 8', 'Play Framework', 'MySQL', 'ScyllaDB', 'REST', 'SOAP', 'Microservices', 'Git', 'GitHub', 'Jira', 'Docker', 'Jenkins', 'Kubernetes']
    cover_image: "jumia-flights-cover.jpg"
    order: 5

  - id: jtravel
    name: Jumia Travel
    organization: Jumia
    start_date: Aug 2014
    end_date: Jul 2017
    url: https://travel.jumia.com
    summary: With over 25,000 hotel listings across 40 African countries and 200,000 hotels across the globe, Jumia Travel is Africa's N°1 hotel booking website.
    description: >
      <p>With over 25,000 hotel listings across 40 African countries and 200,000 hotels across the globe, Jumia Travel is Africa's N°1 hotel booking website.</p>
      <p>I worked across all areas of Jumia Travel, highlighting:</li>
      <ul>
        <li>State Machine and Payment Providers integration</li>
        <li>Rates availability and search engine</li>
        <li>Channel Management and Partners Integration</li>
        <li>Extranet web / mobile application for Hotel Owners</li>
        <li>API architecture and development/li>
        <li>Functional tests architecture</li>
      </ul>
    technologies: ['PHP 5/7', 'Symfony 2', 'Silex', 'MySQL','ElasticSearch', 'Couchbase', 'Memcached', 'Javascript', 'Polymer', 'Amazon Web Services', 'Git', 'GitHub', 'Jira', 'Docker', 'Jenkins', 'Agile']
    cover_image: "jtravel-cover.png"
    order: 6

  - id: jtravel-extranet
    name: Hotels Extranet App
    organization: Jumia
    start_date: Jul 2015
    end_date: Dec 2015
    url: https://play.google.com/store/apps/details?id=com.jovago.extranet.android&hl=pt_PT
    summary: Android application that provides tools for hotel managers of Jumia Travel to manage all the activity for their hotel, from reservations to rates and availability.
    description: >
      <p>The Jovago Extranet app is an Android app for Hotel Managers of Jovago.com platform, that allows then to manage his hotel from the smartphone including:</p>
      <ul>
      <li>Manage Reservations</li>
      <li>Get notified of reservations and cancellations instantly</li>
      <li>Confirm guest check-in or notify us in case the guest did not show up</li>
      <li>Manage rates and availability</li>
      <li>Get stats on the hotel performance on Jovago (page views, conversion rate, reservations)</li>
      <li>Read Hotel reviews</li>
    technologies: ['PHP 5/7', 'Symfony 2',  'MySQL','ElasticSearch', 'Agile']
    cover_image: "jovago-extranet-cover.png"
    order: 7

  - id: uebbill
    name: Uebbill
    organization: ueb
    start_date: Jan 2012
    end_date: Mar 2014
    url: https://uebbill.com
    summary: Web application for small business, that allows to manage the entire billing acitivty in a simple and intuitive way. It includes POS function and its fully certified by Portuguese Finance Authority.
    description: >
      <p>uebbill is a web application oriented to small business, that allows to manage the entire billing process of a business in a simple and intuitive way. It includes POS function and its fully certified by Portuguese Finance Authority.</p>
      <p>It started as a module of the ueb platform but later evolved into a separate project.</p>
    technologies: ['PHP 5', 'Symfony 1.4', 'MySQL', 'Git', 'Bitbucket', 'XML', 'REST']
    cover_image: "uebbill-cover.png"
    order: 8

