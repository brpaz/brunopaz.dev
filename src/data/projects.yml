    summary: Developed of more than 40 extensions for Ulauncher, an application launcher for Linux.
    description: >
      <p><a href="https://ulauncher.io" target="_blank">Ulauncher</a> is popular and extensible application launcher for Linux.</p>
      <p>I have built more than 40 extensions for this launcher including:</p>
      <ul>
        <li><a href="https://ext.ulauncher.io/-/github-brpaz-ulauncher-github" target="_blank">GitHub</a> - Interact with your GitHub account</li>
        <li><a href="https://ext.ulauncher.io/-/github-brpaz-ulauncher-jetbrains" target="_blank">Jetbrains Recent Projects</a> - Open your recent projects from Jetbrains IDEs.</li>
        <li><a href="https://ext.ulauncher.io/-/github-brpaz-ulauncher-heroku" target="_blank">Heroku extension</a> - Easy access your Heroku projects</li>
        <li><a href="https://ext.ulauncher.io/-/github-brpaz-ulauncher-digiralocean" target="_blank">DigitalOcean</a> - Ulauncher extension that provides quick access to your DigitalOcean account</li>
      </ul>
