- id: hardware
  title: Hardware
  items:
    - name: Asus Zenbook S13
      url: https://www.asus.com/en/Laptops/ASUS-ZenBook-S13-UX392FN/
      description: My main laptop, the Asus Zenbook has a 13.9" FHD Display with a 13" form factor, weighting just 1.1KG making it a perfect laptop for Traveling. It comes with a 8th gen Core i7 CPU, 512 GB SSD and 16GB RAM. I have installed Fedora 31 as the OS.

    - name: Acer K222HQL monitor
      url: https://www.acer.com/ac/en/GB/content/model/UM.WW3EE.001
      description: Cheap 21.5" monitor, I use it as my main extra monitor at home. It might not be an high end monitor but relation price/quality is awesome.

    - name: One Plus 6 Mobile Phone
      url: https://www.oneplus.com/pt/oneplus-6
      description: I only buy Stock Android phones. The Google Pixel was hard to get in Portugal, so I got an OnePlus instead and I am very happy with my choice. It´s almost stock Android and comes with 8GB RAM and 128 GB Storage which is more than enough for the years to come.

    - name: Google Chromecast
      url: https://store.google.com/pt/product/chromecast
      description: Google Chromecast is a must have device that allows to turn any TV into a media center. I have one of all TVs allowing me to stream Youtube, Spotify and Netlifx easy from my phone.
