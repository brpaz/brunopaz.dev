- id: devtools
  title: Development tools
  items:
    - name: GitLab
      url: https://gitlab.com/
      description: A single application for the entire Development Lifecycle, I use hosted GitLab for private personal projects. Source Code repository, CI Pipeline, Issue boards and integrated Container Registry, GitLab provides everything I need to manage my code projects.
    - name: Docker and Docker-compose
      url: https://www.docker.com/
      description: Docker and Docker-compose allows to build portable applications that can be run everywhere
    - name: Codacy
      url: https://www.codacy.com/
      description: Automatically identify issues through static code review analysis. Get notified on security issues, code coverage, code duplication, and code complexity in every commit and pull request, directly from your current workflow.

