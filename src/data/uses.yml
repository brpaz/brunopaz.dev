- id: backend
  title: Backend Development
  items:
    - name: Golang
      url: http://golang.com
      description: Golang is my primary language right now and I use it for a bit of everything from Web Applications to Command line tools.
    - name: Echo framework
      url: https://echo.labstack.com/
      description: Echo is an High performance, extensible, minimalist Go web framework
    - name: Symfony
      url: https://symfony.com/
      description: PHP 7 and Symfony provides an amazing combo for building applications quickly.
    - name: Hasura
      url: https://hasura.io/
      description: Hasura is an open source engine that connects to your databases & microservices and flash instantly gives you a production-ready GraphQL API. It can be very useful for building database driven APIs very fast for frontend Applications.
    - name: Directus CMS
      url: https://directus.io/
      description: Open source Headless CMS and API.

- id: frontend
  title: Frontend
  items:
    - name: VueJS
      url: https://vuejs.org/
      description: The Progressive JavaScript Framework. I use Vue for building rich web applications.
    - name: NuxtJS
      url: https://nuxtjs.org
      description: A framework on top of Vue, good for when Server side rendering is a must.
    - name: Gridsome
      url: https://gridsome.org
      description: Gridsome makes it easy for developers to build modern websites, apps & PWAs that are fast by default 🚀
    - name: TailwindCSS
      url: https://tailwindcss.com
      description: Tailwind CSS is a highly customizable, low-level CSS framework that gives you all of the building blocks you need to build bespoke designs without any annoying opinionated styles you have to fight to override.
    - name: Hugo
      url: https://gohugo.io/
      description: Build pure static sites with Golang

- id: datastores
  title: Data stores
  items:
    - name: PostgresSQL
      url: https://postgressql.org/
      description: PostgreSQL is a powerful, open source object-relational database system with over 30 years of active development that has earned it a strong reputation for reliability, feature robustness, and performance.
    - name: Redis
      url: https://redis.io
      description: Redis is an open source (BSD licensed), in-memory data structure store, used as a database, cache and message broker. It supports data structures such as strings, hashes, lists, sets, sorted sets with range queries, bitmaps, hyperloglogs, geospatial indexes with radius queries and streams
    - name: ElasticSearch
      url: https://www.elastic.co/
      description: Elasticsearch is an open source distributed, RESTful search and analytics engine capable of solving a growing number of use cases.
    - name: MongoDB
      url: https://mongodb.com
      description: MongoDB is a general purpose, document-based, distributed database built for modern application developers and for the cloud era. No database makes you more productive.
    - name: Firebase
      url: https://firebase.google.com/
      description: Firebase gives you functionality like analytics, databases, messaging and crash reporting so you can move quickly and focus on your users.

